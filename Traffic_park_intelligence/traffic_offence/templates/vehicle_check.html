<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Vehicle Details</title>
</head>
<body>
    <h2>Verify and Check Vehicle Details</h2>

    <form method="POST" action="">
        {% csrf_token %}
        <label for="vehicle_number">Detected Number Plate:</label>
        <input type="text" id="vehicle_number" name="vehicle_number" value="{{ plate_number }}" required>
        <button type="submit">Check</button>
    </form>

</body>
</html>
